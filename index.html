  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:     #0a0a0f;
      --panel:  #10101a;
      --border: #2a2a3a;
      --c1: #00ffe7;
      --c2: #ff00c8;
      --c3: #ffe600;
      --text: #d0d0e0;
      --dim:  #6a6a8a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 998; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.8) 100%);
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,255,231,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,231,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
    }
    @keyframes gridDrift { to { background-position: 40px 40px; } }

    .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.15; pointer-events: none; z-index: 0; }
    .orb1 { width: 420px; height: 420px; background: var(--c1); top: -120px; left: -120px; animation: orbF 12s ease-in-out infinite; }
    .orb2 { width: 360px; height: 360px; background: var(--c2); bottom: -80px; right: -80px; animation: orbF 15s ease-in-out infinite reverse; }
    .orb3 { width: 260px; height: 260px; background: var(--c3); top: 45%; left: 55%; animation: orbF 10s ease-in-out infinite 3s; }
    @keyframes orbF { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px,-30px); } }

    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 50px 20px 80px;
    }

    .card {
      width: 100%; max-width: 440px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 30px 26px 36px;
      position: relative;
      box-shadow: 0 0 0 1px #00ffe710, 0 10px 60px rgba(0,0,0,0.75);
      animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }

    .card::before, .card::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: var(--c1); border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .win-bar {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 24px;
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--dim);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.r { background: #ff5f57; box-shadow: 0 0 5px #ff5f57; }
    .dot.y { background: #febc2e; box-shadow: 0 0 5px #febc2e; }
    .dot.g { background: #28c840; box-shadow: 0 0 5px #28c840; }
    .win-bar .title { margin-left: auto; }

    .avatar-wrap { display: flex; justify-content: center; margin-bottom: 14px; animation: fadeUp 0.7s 0.1s both; }
    .avatar-ring {
      width: 90px; height: 90px; border-radius: 50%; padding: 3px;
      background: conic-gradient(var(--c1), var(--c2), var(--c3), var(--c1));
      animation: spin 6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: var(--bg); border: 3px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }

    .name {
      font-family: 'VT323', monospace; font-size: 38px;
      text-align: center; color: var(--c1);
      text-shadow: 0 0 8px #00ffe7aa, 0 0 24px #00ffe740;
      line-height: 1; animation: fadeUp 0.7s 0.15s both;
    }
    .cursor {
      display: inline-block; width: 9px; height: 14px;
      background: var(--c1); box-shadow: 0 0 8px var(--c1);
      vertical-align: middle; margin-left: 2px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .handle {
      text-align: center; font-size: 11px; letter-spacing: 0.18em;
      color: var(--c2); text-shadow: 0 0 8px #ff00c8aa;
      margin-top: 5px; animation: fadeUp 0.7s 0.2s both;
    }
    .bio {
      text-align: center; font-size: 13px; color: var(--dim);
      margin: 13px 0 24px; line-height: 1.65;
      animation: fadeUp 0.7s 0.25s both;
    }
    .bio em { color: var(--c3); font-style: normal; text-shadow: 0 0 6px #ffe600aa; }

    .divider {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 18px; animation: fadeUp 0.7s 0.3s both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider span { font-family: 'Press Start 2P', monospace; font-size: 6px; color: var(--dim); letter-spacing: 0.2em; }

    .links { display: flex; flex-direction: column; gap: 9px; }

    .link-btn {
      display: flex; align-items: center; gap: 13px;
      padding: 11px 15px;
      border: 1px solid var(--border); border-radius: 2px;
      background: rgba(255,255,255,0.02);
      color: var(--text); text-decoration: none;
      font-family: 'Share Tech Mono', monospace; font-size: 13px; letter-spacing: 0.04em;
      position: relative; overflow: hidden;
      transition: color 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      animation: fadeUp 0.7s both;
    }
    .link-btn:nth-child(1){animation-delay:0.33s}
    .link-btn:nth-child(2){animation-delay:0.40s}
    .link-btn:nth-child(3){animation-delay:0.47s}
    .link-btn:nth-child(4){animation-delay:0.54s}
    .link-btn:nth-child(5){animation-delay:0.61s}
    .link-btn:nth-child(6){animation-delay:0.68s}
    .link-btn:nth-child(7){animation-delay:0.75s}
    .link-btn:nth-child(8){animation-delay:0.82s}
    .link-btn:nth-child(9){animation-delay:0.89s}

    .link-btn::before {
      content: ''; position: absolute;
      top: 0; left: -100%; width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
      transition: left 0.45s ease;
    }
    .link-btn:hover::before { left: 160%; }

    .link-btn::after {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--bc, var(--c1));
      box-shadow: 0 0 10px var(--bc, var(--c1));
      transform: scaleY(0); transform-origin: center;
      transition: transform 0.2s;
    }
    .link-btn:hover::after { transform: scaleY(1); }

    .link-btn:hover {
      border-color: var(--bc, var(--c1));
      color: #fff;
      box-shadow: 0 0 14px color-mix(in srgb, var(--bc, var(--c1)) 25%, transparent);
      transform: translateX(5px);
    }

    .link-btn .icon {
      width: 20px; height: 20px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .link-btn .icon svg {
      width: 18px; height: 18px;
      fill: var(--bc, var(--c1));
      transition: filter 0.2s;
    }
    .link-btn:hover .icon svg { filter: drop-shadow(0 0 5px var(--bc, var(--c1))); }

    .link-btn .label { flex: 1; }
    .link-btn .arrow {
      font-size: 18px; color: var(--dim);
      transition: color 0.2s, transform 0.2s;
    }
    .link-btn:hover .arrow { color: var(--bc, var(--c1)); transform: translateX(3px); }

    .bc-cyan   { --bc: #00ffe7; }
    .bc-pink   { --bc: #ff00c8; }
    .bc-green  { --bc: #00ff88; }
    .bc-red    { --bc: #ff4455; }
    .bc-blue   { --bc: #00bfff; }
    .bc-orange { --bc: #ff8c00; }
    .bc-lime   { --bc: #aaff00; }
    .bc-yellow { --bc: #ffe600; }
    .bc-purple { --bc: #bf5fff; }

    .footer {
      margin-top: 26px;
      font-family: 'Press Start 2P', monospace; font-size: 6px;
      color: var(--dim); letter-spacing: 0.15em; text-align: center;
      animation: fadeUp 0.7s 1s both;
    }
    .footer span { color: var(--c2); text-shadow: 0 0 8px #ff00c8aa; }

    .ticker-wrap {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 26px; background: rgba(10,10,15,0.96);
      border-top: 1px solid var(--border);
      overflow: hidden; z-index: 10;
      display: flex; align-items: center;
    }
    .ticker {
      display: flex; gap: 60px; white-space: nowrap;
      animation: tick 30s linear infinite;
      font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--dim);
    }
    .ticker b { color: var(--c1); }
    @keyframes tick { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
  </style>
</head>
